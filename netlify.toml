[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/api/llamacloud/*"
  to = "/.netlify/functions/llamacloud-proxy/:splat"
  status = 200

[[redirects]]
  from = "/api/google-sheet-read"
  to = "/.netlify/functions/google-sheet-read"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
